<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Public music jukebox - Search and add your favorite songs to the queue">
    <title>🎵 Music Jukebox - Your Shared Music Experience</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎵 Music Jukebox</h1>
            <p class="subtitle">Search, add, and enjoy music together</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="Search for songs, artists, or albums..." autocomplete="off">
            </div>
            <div id="searchResults" class="search-results"></div>
        </section>

        <!-- Now Playing Section -->
        <section id="nowPlayingSection" class="now-playing hidden">
            <div class="album-art-large" id="nowPlayingArt">🎵</div>
            <div class="now-playing-info">
                <div class="now-playing-label">Now Playing</div>
                <h2 class="now-playing-title" id="nowPlayingTitle">-</h2>
                <p class="now-playing-artist" id="nowPlayingArtist">-</p>
                <p class="now-playing-album" id="nowPlayingAlbum">-</p>
                <div class="progress-container">
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                    <div class="progress-bar" id="progressBarContainer">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
            <div class="playback-controls">
                <button id="playPauseBtn" class="btn btn-primary btn-icon control-btn" title="Play/Pause">▶️</button>
                <button id="skipBtn" class="btn btn-secondary btn-icon control-btn"
                    title="Skip to next song">⏭️</button>
                <div class="volume-control">
                    <span class="volume-icon">🔊</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
                    <span class="volume-value" id="volumeValue">70%</span>
                </div>
            </div>
        </section>

        <!-- Hidden Audio Element -->
        <audio id="audioPlayer" preload="metadata"></audio>


        <!-- Main Content Grid -->
        <div class="main-content">
            <!-- Queue Section -->
            <section class="queue-section">
                <div class="queue-header">
                    <h2 class="queue-title">Up Next</h2>
                    <span class="queue-count" id="queueCount">0 songs</span>
                </div>
                <div id="queueList" class="queue-list">
                    <div class="queue-empty">
                        <div class="queue-empty-icon">📭</div>
                        <p>No songs in queue</p>
                        <p style="font-size: 0.9rem; margin-top: 0.5rem;">Search and add songs to get started!</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
